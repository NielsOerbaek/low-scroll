services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - web
    restart: unless-stopped

  web:
    build: ./web
    expose:
      - "3000"
    environment:
      - DATABASE_PATH=/data/db/ig.db
      - MEDIA_PATH=/data/media
      - BASE_URL=${BASE_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - NEWSLETTER_API_KEY=${NEWSLETTER_API_KEY}
      - NEWS_PASSWORD=${NEWS_PASSWORD:-}
      - ONESHOT_API_KEY=${ONESHOT_API_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY}
    volumes:
      - ./data/db:/data/db
      - ./data/media:/data/media
    restart: unless-stopped

  scraper:
    build: ./scraper
    environment:
      - DATABASE_PATH=/data/db/ig.db
      - MEDIA_PATH=/data/media
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - BASE_URL=${BASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEWSLETTER_DIGEST_TIME=${NEWSLETTER_DIGEST_TIME:-07:00}
      - NEWSLETTER_DIGEST_MODE=${NEWSLETTER_DIGEST_MODE:-local}
    volumes:
      - ./data/db:/data/db
      - ./data/media:/data/media
    restart: unless-stopped

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:'Courier New',Courier,monospace;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;">
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;">

        <!-- Header -->
        <tr><td style="padding:20px 24px;border-bottom:1px solid #eee;" align="center">
          <table cellpadding="0" cellspacing="0"><tr><td align="center" style="line-height:1;">
            <span style="font-size:32px;font-weight:900;font-family:'Arial Black',Arial,sans-serif;letter-spacing:-0.5px;color:#E8401C;">Føhns</span>
            <span style="font-size:32px;font-weight:900;font-family:'Arial Black',Arial,sans-serif;letter-spacing:-0.5px;color:#1A2C4E;">Stiftstidende</span>
            <br>
            <span style="font-size:11px;font-weight:600;color:#1A2C4E;letter-spacing:0.5px;font-family:Arial,sans-serif;">news.raakode.dk</span>
          </td></tr></table>
          <div style="margin-top:12px;font-family:'Courier New',Courier,monospace;font-size:13px;color:#8e8e8e;">{{ digest_date }}</div>
        </td></tr>

        <!-- Digest content -->
        <tr><td style="padding:20px 24px;">
          <div style="font-family:'Courier New',Courier,monospace;font-size:13px;color:#262626;line-height:1.6;">
            {{ digest_content }}
          </div>
        </td></tr>

        <!-- Footer -->
        <tr><td style="padding:16px 24px;border-top:1px solid #eee;">
          <p style="margin:0;font-family:'Courier New',Courier,monospace;font-size:11px;color:#8e8e8e;">
            <a href="{{ base_url }}/settings" style="color:#8e8e8e;text-decoration:underline;">Administrer indstillinger</a>
          </p>
        </td></tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
